<title>Global Markets — Live Performance Map</title>

<body>
  <header class="summary-bar">
    <div class="summary-bar__inner">
      <div class="summary-bar__title">
        <svg class="summary-bar__logo" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-label="Globe icon">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="12" cy="12" rx="5" ry="10" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4.5 6.5h15M4.5 17.5h15" stroke="currentColor" stroke-width="1" opacity="0.5"/>
        </svg>
        <h1>Global Markets</h1>
        <span class="summary-bar__subtitle">Live Performance Map</span>
        <span class="refresh-badge">
          <span class="stream-dot" id="stream-dot"></span>
          <span id="refresh-status">Live</span>
        </span>
      </div>
      <div class="summary-bar__stats">
        <div class="stat">
          <span class="stat__label">Countries</span>
          <span class="stat__value" id="stat-total">—</span>
        </div>
        <div class="stat stat--up">
          <span class="stat__label">Gaining</span>
          <span class="stat__value" id="stat-up">—</span>
        </div>
        <div class="stat stat--down">
          <span class="stat__label">Declining</span>
          <span class="stat__value" id="stat-down">—</span>
        </div>
        <div class="stat">
          <span class="stat__label">Updated</span>
          <span class="stat__value stat__value--time" id="stat-updated">—</span>
        </div>
        <div class="stat">
          <span class="stat__label">Next Refresh</span>
          <span class="stat__value stat__value--time" id="next-refresh">60m 00s</span>
        </div>
      </div>
    </div>
  </header>
  <main class="main-layout">
    <div class="map-container" id="map-container">
      <div class="region-bar">
        <button data-region="americas" class="region-btn">Americas</button>
        <button data-region="europe" class="region-btn">Europe</button>
        <button data-region="asia" class="region-btn">Asia</button>
        <button data-region="africa" class="region-btn">Africa</button>
      </div>
      <div id="map"></div>
      <div class="map-controls">
        <button id="btn-zoom-in" class="ctrl-btn" aria-label="Zoom in" title="Zoom in">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span class="ctrl-zoom-level" id="zoom-level">100%</span>
        <button id="btn-zoom-out" class="ctrl-btn" aria-label="Zoom out" title="Zoom out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="ctrl-divider"></div>
        <button id="btn-rotate-left" class="ctrl-btn" aria-label="Rotate left" title="Rotate left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button id="btn-rotate-right" class="ctrl-btn" aria-label="Rotate right" title="Rotate right">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        </button>
        <div class="ctrl-divider"></div>
        <button id="btn-reset" class="ctrl-btn" aria-label="Reset view" title="Reset view">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </button>
      </div>
      <div class="interaction-hint" id="interaction-hint">
        <span>Drag to rotate</span>
        <span class="hint-dot">•</span>
        <span>Scroll to zoom</span>
        <span class="hint-dot">•</span>
        <span>Hover for details</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <aside class="leaderboard" id="leaderboard">
      <div class="leaderboard__section leaderboard__section--gainers">
        <div class="leaderboard__header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          <h2 class="leaderboard__title leaderboard__title--up">Top Gainers</h2>
        </div>
        <div class="leaderboard__list" id="gainers-list"></div>
      </div>
      <div class="leaderboard__divider"></div>
      <div class="leaderboard__section leaderboard__section--losers">
        <div class="leaderboard__header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
          <h2 class="leaderboard__title leaderboard__title--down">Top Losers</h2>
        </div>
        <div class="leaderboard__list" id="losers-list"></div>
      </div>
    </aside>
  </main>
  <div class="tooltip" id="tooltip"></div>
  <footer class="site-footer">
    <span>&copy; 2026 Global Markets Map</span>

  <script src="app.js"></script>
